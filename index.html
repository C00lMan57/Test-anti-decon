<!DOCTYPE html>
<html>
<head>
    <title>Proxy YouTube</title>
    <style>
        #frame { width: 100%; height: 80vh; border: none; }
        #output { white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <input type="text" id="url" placeholder="URL à visiter" value="https://www.youtube.com" />
    <button onclick="loadUrl()">Go</button>
    <div id="output"></div>
    <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>

    <script>
        async function loadUrl() {
            const url = document.getElementById("url").value;
            const output = document.getElementById("output");
            const frame = document.getElementById("frame");

            try {
                // Utilise fetch avec credentials pour transmettre les cookies
                const response = await fetch(`https://ton-projet.glitch.me/proxy?url=${encodeURIComponent(url)}`, {
                    credentials: 'include'  // Transmet les cookies du navigateur
                });
                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }
                const html = await response.text();
                // Affiche le HTML dans l'iframe
                frame.srcdoc = html;
                // Remplace les liens pour qu'ils passent aussi par le proxy
                frame.contentWindow.document.open();
                frame.contentWindow.document.write(
                    html.replace(/href="([^"]*)"/g, `href="javascript:parent.loadUrl('$1')"`)
                        .replace(/src="([^"]*)"/g, `src="https://ton-projet.glitch.me/proxy?url=${encodeURIComponent('$1')}"`)
                );
                frame.contentWindow.document.close();
            } catch (error) {
                output.textContent = `Erreur: ${error.message}`;
            }
        }
    </script>
</body>
</html>
