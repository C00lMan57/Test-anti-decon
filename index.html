<!DOCTYPE html>
<html>
<body>
    <input type="text" id="url" placeholder="URL à visiter (ex: https://google.com)" />
    <button onclick="proxy()">Go</button>
    <iframe id="frame" style="width:100%; height:80vh; border:none;"></iframe>
    <script>
        function proxy() {
            const url = document.getElementById("url").value;
            // Utilise corsproxy.io (pas besoin d'en-têtes)
            document.getElementById("frame").src = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        }
    </script>
</body>
</html>
