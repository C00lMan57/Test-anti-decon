<!DOCTYPE html>
<html>
<head>
    <title>Proxy YouTube</title>
    <style>
        #frame {
            width: 100%;
            height: 80vh;
            border: none;
        }
        #output {
            color: red;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <input type="text" id="url" placeholder="URL à visiter" value="https://www.youtube.com" />
    <button onclick="loadUrl()">Go</button>
    <div id="output"></div>
    <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>

    <script>
        async function loadUrl() {
            const url = document.getElementById("url").value;
            const output = document.getElementById("output");
            const frame = document.getElementById("frame");

            output.textContent = "Chargement...";

            try {
                // Utilise un proxy CORS public qui fonctionne (testé avec YouTube)
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }

                const data = await response.json();
                if (data.contents) {
                    // Affiche le HTML dans l'iframe
                    frame.srcdoc = data.contents;
                    // Remplace les liens pour qu'ils passent aussi par le proxy
                    frame.onload = function() {
                        const frameDoc = frame.contentDocument || frame.contentWindow.document;
                        const links = frameDoc.getElementsByTagName('a');
                        for (let link of links) {
                            link.href = `javascript:parent.loadUrl('${link.href}')`;
                        }
                        const scripts = frameDoc.getElementsByTagName('script');
                        for (let script of scripts) {
                            if (script.src) {
                                script.src = `https://api.allorigins.win/get?url=${encodeURIComponent(script.src)}`;
                            }
                        }
                    };
                    output.textContent = "";
                } else {
                    throw new Error("Aucun contenu retourné");
                }
            } catch (error) {
                output.textContent = `Erreur: ${error.message}`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
